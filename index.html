<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSight - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #FFF0E5 0%, #FFE5D9 100%);
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem 1rem;
            animation: fadeInDown 0.6s ease-out;
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            color: #15803D;
            letter-spacing: -0.5px;
        }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.05),
                0 10px 20px rgba(0, 0, 0, 0.08),
                0 20px 40px rgba(0, 0, 0, 0.12);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 8px 12px rgba(0, 0, 0, 0.08),
                0 16px 32px rgba(0, 0, 0, 0.12),
                0 32px 64px rgba(0, 0, 0, 0.16);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #15803D;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-size: 0.95rem;
            color: #6B7280;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
            transition: color 0.2s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            color: #1F2937;
            background: #FFFFFF;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #15803D;
            box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.1);
            transform: translateY(-1px);
        }

        .form-input:hover {
            border-color: #9CA3AF;
        }

        .form-input::placeholder {
            color: #9CA3AF;
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #9CA3AF;
            pointer-events: none;
            transition: fill 0.2s ease;
        }

        .form-input:focus + .input-icon {
            fill: #15803D;
        }

        .helper-text {
            font-size: 0.8125rem;
            color: #6B7280;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .helper-text.error {
            color: #DC2626;
            animation: shake 0.4s ease;
        }

        .helper-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-top: 2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            min-height: 44px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #15803D 0%, #16A34A 100%);
            color: #FFFFFF;
            box-shadow: 0 4px 12px rgba(21, 128, 61, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(21, 128, 61, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #FFFFFF;
            color: #374151;
            border: 2px solid #E5E7EB;
        }

        .btn-secondary:hover {
            background: #F9FAFB;
            border-color: #D1D5DB;
            transform: translateY(-1px);
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer {
            padding: 1.5rem;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .legal-links {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .legal-link {
            font-size: 0.875rem;
            color: #6B7280;
            text-decoration: none;
            transition: color 0.2s ease;
            position: relative;
        }

        .legal-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: #15803D;
            transition: width 0.3s ease;
        }

        .legal-link:hover {
            color: #15803D;
        }

        .legal-link:hover::after {
            width: 100%;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #9CA3AF;
            font-size: 0.875rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E5E7EB;
        }

        .divider::before {
            margin-right: 1rem;
        }

        .divider::after {
            margin-left: 1rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 640px) {
            .app-name {
                font-size: 1.5rem;
            }

            .logo {
                width: 40px;
                height: 40px;
            }

            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 20px;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .card-subtitle {
                font-size: 0.875rem;
            }

            .form-input {
                font-size: 16px;
            }

            .legal-links {
                flex-direction: column;
                gap: 0.75rem;
            }
        }

        @media (min-width: 640px) and (max-width: 1024px) {
            .login-card {
                padding: 2.5rem 2rem;
            }

            .form-input {
                font-size: 1rem;
            }
        }

        @media (min-width: 1024px) {
            .app-name {
                font-size: 2.25rem;
            }

            .card-title {
                font-size: 2rem;
            }

            .form-input {
                font-size: 1.0625rem;
                padding: 1rem 1.125rem;
            }

            .btn {
                font-size: 1.0625rem;
            }
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .password-toggle:hover {
            transform: translateY(-50%) scale(1.1);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            fill: #9CA3AF;
            transition: fill 0.2s ease;
        }

        .password-toggle:hover svg {
            fill: #374151;
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            font-size: 0.875rem;
            color: #15803D;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .forgot-password a:hover {
            color: #16A34A;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="brand-header">
                <img src="https://cobekartus.sirv.com/Images/logoipsum-392.png" alt="FinSight Logo" class="logo">
                <h1 class="app-name">FinSight</h1>
            </div>
        </header>

        <main class="main">
            <div class="login-card">
                <div class="card-header">
                    <h2 class="card-title">Welcome Back!</h2>
                    <p class="card-subtitle">Sign in to access your financial insights</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                class="form-input" 
                                placeholder="you@company.com"
                                required
                            >
                            <svg class="input-icon" viewBox="0 0 24 24">
                                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                            </svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input" 
                                placeholder="Enter your password"
                                required
                            >
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <svg viewBox="0 0 24 24" class="eye-icon">
                                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="forgot-password">
                            <a data-href="#">Forgot password?</a>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary" data-route="SCR002">
                            <svg class="btn-icon" viewBox="0 0 24 24">
                                <path d="M10 17l5-5-5-5v10z"/>
                            </svg>
                            Log in
                        </button>
                    </div>
                </form>

                <div class="divider">or</div>

                <p class="helper-text" style="text-align: center; margin-top: 1rem;">
                    <svg class="helper-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                    </svg>
                    New to FinSight? Contact your administrator for access
                </p>
            </div>
        </main>

        <footer class="footer">
            <div class="legal-links">
                <a data-href="#" class="legal-link">Privacy Policy</a>
                <a data-href="#" class="legal-link">Terms of Service</a>
                <a data-href="#" class="legal-link">Support</a>
                <span style="color: #9CA3AF; font-size: 0.875rem;">© 2026 FinSight. All rights reserved.</span>
            </div>
        </footer>
    </div>

    <script>
        const passwordToggle = document.querySelector('.password-toggle');
        const passwordInput = document.getElementById('password');
        
        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.style.transform = type === 'text' ? 'translateY(-50%) rotate(180deg)' : 'translateY(-50%) rotate(0deg)';
        });

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                return;
            }
            
            const submitBtn = loginForm.querySelector('.btn-primary');
            submitBtn.style.transform = 'scale(0.95)';
            submitBtn.innerHTML = '<svg class="btn-icon" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity="0.25"/><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>Logging in...';
            
            setTimeout(() => {
                console.log('Login successful - routing to SCR002');
            }, 1000);
        });

        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.querySelector('.form-label').style.color = '#15803D';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.querySelector('.form-label').style.color = '#374151';
            });
        });
    </script>
</body>
</html>
